(function(){
  const c=document.getElementById('eq-bg'),ctx=c.getContext('2d');
  const EQS=['∂L/∂w','σ(z)','∇θJ','E[Rₜ]','V*(s)','π*(a|s)','KL(p‖q)','H(X)',
    'argmax Q','ELBO','Aᵀ=UΣVᵀ','∫p dx=1','J(π)','det(J)','‖w‖²',
    'tanh(z)','βKL','α∇J','Σ⁻¹','tr(A)','ReLU','softmax','∑wᵢxᵢ'];
  let drops=[];
  function resize(){
    c.width=innerWidth; c.height=innerHeight;
    const mW=innerWidth*.11;
    drops=Array.from({length:24},()=>({
      x:Math.random()<.5?Math.random()*mW:innerWidth-mW+Math.random()*mW,
      y:Math.random()*c.height,
      eq:EQS[Math.floor(Math.random()*EQS.length)],
      speed:Math.random()*.26+.06,
      opacity:Math.random()*.065+.02,
      size:Math.floor(Math.random()*4)+9,
    }));
  }
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    drops.forEach(d=>{
      ctx.font=`${d.size}px JetBrains Mono,monospace`;
      ctx.fillStyle=`rgba(59,130,246,${d.opacity})`;
      ctx.fillText(d.eq,d.x,d.y);
      d.y+=d.speed;
      if(d.y>c.height+20){d.y=-20;d.eq=EQS[Math.floor(Math.random()*EQS.length)];}
    });
    requestAnimationFrame(draw);
  }
  resize();draw();addEventListener('resize',resize);
})();

// ═══ LAYOUT ════════════════════════════════════════
const W=innerWidth,H=innerHeight,CX=W/2;
const NODE_R=18;
const LAYER_CONFIG={
  l5:{y:H*.10,rows:1},
  l4:{y:H*.23,rows:2,rowH:H*.086},
  l3:{y:H*.43,rows:1},
  l2:{y:H*.55,rows:1},
  l1:{y:H*.67,rows:1},
  l0:{y:H*.77,rows:2,rowH:H*.086},
};

function buildGraph(){
  const nodes=[],links=[],byId={};
  REPOS.forEach(r=>{
    const cfg=LAYER_CONFIG[r.layer];
    const lr=REPOS.filter(x=>x.layer===r.layer),total=lr.length,i=lr.indexOf(r);
    let x,y;
    if(cfg.rows===2){
      const r0=Math.ceil(total/2),row=i<r0?0:1,idx=row===0?i:i-r0,cnt=row===0?r0:total-r0;
      const spread=Math.min(W*.83,cnt*148);
      x=CX-spread/2+(spread/(cnt-1||1))*idx; y=cfg.y+row*cfg.rowH;
    }else{
      const spread=Math.min(W*.83,total*148);
      x=CX-spread/2+(spread/(total-1||1))*i; y=cfg.y;
    }
    const node={...r,type:'repo',x,y};
    nodes.push(node); byId[r.id]=node;
  });
  // Sparse connections: each node → 3 nearest in adjacent layer
  const pairs=[['l0','l1'],['l1','l2'],['l2','l3'],['l3','l4'],['l4','l5']];
  pairs.forEach(([a,b])=>{
    const as=nodes.filter(n=>n.layer===a),bs=nodes.filter(n=>n.layer===b);
    as.forEach(an=>{
      [...bs].sort((x,y)=>Math.abs(x.x-an.x)-Math.abs(y.x-an.x)).slice(0,3)
        .forEach(bn=>links.push({s:an.id,t:bn.id,la:a,lb:b}));
    });
  });
  return{nodes,links,byId};
}
const{nodes,links,byId}=buildGraph();
const nodeGMap={};

  const m=f.append('feMerge');
  m.append('feMergeNode').attr('in','blur');
  m.append('feMergeNode').attr('in','SourceGraphic');
});

const af2=defs.append('filter').attr('id','aurora-f').attr('x','-50%').attr('y','-50%').attr('width','200%').attr('height','200%');
af2.append('feGaussianBlur').attr('in','SourceGraphic').attr('stdDeviation','30');

// ── LAYER BANDS ──────────────────────────────────
Object.entries(LAYER_CONFIG).forEach(([lk,cfg])=>{
  const col=LAYERS[lk].col;
  const bH=cfg.rows===2?(cfg.rowH+NODE_R*2+14):(NODE_R*2+12);
  root.append('rect').attr('x',0).attr('y',cfg.y-NODE_R-6)
    .attr('width',W).attr('height',bH)
    .attr('fill',col).attr('opacity',.032).attr('pointer-events','none');
  root.append('text').attr('x',26).attr('y',cfg.y+4)
    .attr('font-family','JetBrains Mono,monospace').attr('font-size','8.5px')
    .attr('fill',col).attr('opacity',.38).attr('letter-spacing','2')
    .text(LAYERS[lk].short);
});

// ── CURSOR AURORA ────────────────────────────────
const aurora=root.insert('g','*').append('circle')
  .attr('r',155).attr('fill','url(#aurora-g)').attr('filter','url(#aurora-f)')
  .attr('opacity',0).attr('pointer-events','none');

// ── BASE CONNECTIONS (sparse, very faint) ─────────
const baseEdgeG=root.append('g');
baseEdgeG.selectAll('line').data(links).join('line')
  .attr('x1',d=>byId[d.s].x).attr('y1',d=>byId[d.s].y)
  .attr('x2',d=>byId[d.t].x).attr('y2',d=>byId[d.t].y)
  .attr('stroke','rgba(110,155,255,0.065)').attr('stroke-width',.8)
  .style('opacity',0).transition().duration(1200).delay(700).style('opacity',1);

// ── LAYERS ──────────────────────────────────────
const signalG=root.append('g').attr('pointer-events','none');
const flowEdgeG=root.append('g').attr('pointer-events','none');
const rippleG=root.append('g').attr('pointer-events','none');

// ═══ NODES ═════════════════════════════════════════
const nodeG=root.append('g').selectAll('g').data(nodes).join('g')
  .attr('transform',d=>`translate(${d.x},${d.y})`);

nodeG.each(function(d){
  nodeGMap[d.id]=this;
  const g=d3.select(this),col=LAYERS[d.layer].col;
  // Proximity ring
  g.append('circle').attr('class','prox-ring').attr('r',NODE_R+10)
    .attr('fill','none').attr('stroke',col).attr('stroke-width',1.4).attr('stroke-opacity',0)
    .attr('pointer-events','none');
  // Ambient pulse ring
  g.append('circle').attr('class','pulse-ring').attr('r',NODE_R)
    .attr('fill','none').attr('stroke',col).attr('stroke-width',.9).attr('stroke-opacity',0)
    .attr('pointer-events','none');
  // Main body
  g.append('circle').attr('class','node-body').attr('r',NODE_R)
    .attr('fill',col+'1c').attr('stroke',col).attr('stroke-opacity',.52).attr('stroke-width',1.2);
  // Inner nucleus
  g.append('circle').attr('class','nucleus').attr('r',4.5).attr('fill',col).attr('opacity',.85);
  // Label
  const angle=Math.atan2(d.y-H/2,d.x-CX);
  const lx=Math.cos(angle)*(NODE_R+8),ly=Math.sin(angle)*(NODE_R+8);
  const anchor=Math.abs(d.x-CX)<55?'middle':(d.x>CX?'start':'end');
  g.append('text').attr('class','node-label')
    .attr('x',lx).attr('y',ly+3).attr('text-anchor',anchor)
    .attr('font-family','JetBrains Mono,monospace').attr('font-size','8.5px')
    .attr('fill',col).attr('opacity',.72).text(d.short);
  // Interactions
  g.style('cursor','pointer')
    .on('mouseenter',function(e,nd){onNodeEnter(e,nd,g);showTT(e,nd);})
    .on('mousemove',moveTT)
    .on('mouseleave',function(e,nd){onNodeLeave(nd,g);hideTT();})
    .on('click',(e,nd)=>{onNodeClick(nd);if(nd.url)window.open(nd.url,'_blank');});
});
nodeG.style('opacity',0).transition().duration(800).delay((d,i)=>400+i*20).style('opacity',1);

// ── Ambient pulse per node (staggered) ───────────
nodes.forEach((d,i)=>{
  const ms=LAYERS[d.layer].pulseMs;
  const g=d3.select(nodeGMap[d.id]),ring=g.select('.pulse-ring');
  function pulse(){
    ring.attr('r',NODE_R).attr('stroke-opacity',.55)
      .transition().duration(ms*.72).ease(d3.easeSinOut)
      .attr('r',NODE_R+30).attr('stroke-opacity',0)
      .on('end',()=>setTimeout(pulse,ms*.28+Math.random()*350));
  }
  setTimeout(pulse,i*(ms/nodes.length));
});

// ═══ SIGNAL PARTICLE ENGINE ═══════════════════════
function spawnSignal(src,tgt,col,delay=0,op=0.88){
  setTimeout(()=>{
    const p=signalG.append('circle').attr('cx',src.x).attr('cy',src.y)
      .attr('r',2.8).attr('fill',col).attr('opacity',0);
    p.transition().duration(80).attr('opacity',op)
      .transition().duration(480).ease(d3.easeLinear)
      .attr('cx',tgt.x).attr('cy',tgt.y)
      .transition().duration(80).attr('opacity',0)
      .on('end',()=>p.remove());
  },delay);
}

// ═══ AMBIENT NEURAL FIRING ════════════════════════
let activeNode=null;
function ambientFire(){
  if(activeNode) return;
  const eligible=nodes.filter(n=>n.layer!=='l5');
  const src=eligible[Math.floor(Math.random()*eligible.length)];
  const col=LAYERS[src.layer].col;
  const lIdx=LAYER_ORDER.indexOf(src.layer);
  const nextKey=LAYER_ORDER[lIdx+1];
  if(!nextKey) return;
  const targets=nodes.filter(n=>n.layer===nextKey);
  // Flash nucleus
  d3.select(nodeGMap[src.id]).select('.nucleus')
    .transition().duration(120).attr('r',7).attr('opacity',1)
    .transition().duration(320).attr('r',4.5).attr('opacity',.85);
  // Signals to nearest 2-3 nodes in next layer
  [...targets].sort(()=>Math.random()-.5).slice(0,Math.min(3,targets.length))
    .forEach((t,i)=>spawnSignal(src,t,col,i*75,0.55));
}
setInterval(ambientFire,2300+Math.random()*400);

// ═══ HOVER EFFECTS ════════════════════════════════
function onNodeEnter(e,nd,g){
  activeNode=nd.id;
  const col=LAYERS[nd.layer].col;
  const lIdx=LAYER_ORDER.indexOf(nd.layer);

  // Scale group
  g.transition().duration(155).ease(d3.easeBackOut.overshoot(1.4))
    .attr('transform',`translate(${nd.x},${nd.y}) scale(1.44)`);
  g.select('.node-body').attr('stroke-opacity',1).attr('fill',col+'33').attr('filter',`url(#gl-${nd.layer})`);
  g.select('.nucleus').attr('r',6).attr('opacity',1);
  g.select('.prox-ring').attr('stroke-opacity',.7).attr('r',NODE_R+11);

  // Animated flow edges
  flowEdgeG.selectAll('*').remove();
  const nextKey=LAYER_ORDER[lIdx+1],prevKey=LAYER_ORDER[lIdx-1];
  if(nextKey){
    nodes.filter(n=>n.layer===nextKey).forEach((t,i)=>{
      flowEdgeG.append('line')
        .attr('x1',nd.x).attr('y1',nd.y).attr('x2',t.x).attr('y2',t.y)
        .attr('stroke',col).attr('stroke-width',1.8).attr('stroke-opacity',.7)
        .attr('stroke-dasharray','7,5')
        .style('animation','signal-flow .55s linear infinite');
      spawnSignal(nd,t,col,i*52);
    });
  }
  // Backward gradient signals (delayed, dimmer)
  if(prevKey){
    setTimeout(()=>{
      nodes.filter(n=>n.layer===prevKey).slice(0,4)
        .forEach((t,i)=>spawnSignal(nd,t,col+'77',i*42,0.42));
    },400);
  }

  // Dim other layers
  nodeG.each(function(dd){
    if(dd.layer!==nd.layer)
      d3.select(this).transition().duration(200).style('opacity',.12);
  });
  document.querySelectorAll('.li').forEach(el=>{
    el.style.opacity=el.dataset.layer===nd.layer?'1':'0.2';
  });
}

function onNodeLeave(nd,g){
  activeNode=null;
  const col=LAYERS[nd.layer].col;
  g.transition().duration(200).ease(d3.easeCubicOut)
    .attr('transform',`translate(${nd.x},${nd.y}) scale(1)`);
  g.select('.node-body').attr('stroke-opacity',.52).attr('fill',col+'1c').attr('filter',null);
  g.select('.nucleus').attr('r',4.5).attr('opacity',.85);
  g.select('.prox-ring').attr('stroke-opacity',0);
  flowEdgeG.selectAll('*').remove();
  nodeG.each(function(){d3.select(this).transition().duration(280).style('opacity',1);});
  document.querySelectorAll('.li').forEach(el=>el.style.opacity='1');
}

// Click: full forward pass cascade
function onNodeClick(nd){
  const col=LAYERS[nd.layer].col;
  const lIdx=LAYER_ORDER.indexOf(nd.layer);
  // Ripple
  [1,2,3].forEach(k=>setTimeout(()=>{
    const r=rippleG.append('circle').attr('cx',nd.x).attr('cy',nd.y)
      .attr('r',NODE_R+2).attr('fill','none').attr('stroke',col)
      .attr('stroke-width',2.4-k*.5).attr('stroke-opacity',.85);
    r.transition().duration(680).ease(d3.easeCubicOut)
      .attr('r',NODE_R+58+k*14).attr('stroke-opacity',0).on('end',()=>r.remove());
  },k*95));
  // Forward pass through all subsequent layers
  let delay=0;
  for(let i=lIdx;i<LAYER_ORDER.length-1;i++){
    const srcs=i===lIdx?[nd]:nodes.filter(n=>n.layer===LAYER_ORDER[i]);
    const tgts=nodes.filter(n=>n.layer===LAYER_ORDER[i+1]);
    const d=delay;
    srcs.forEach(src=>tgts.forEach((t,j)=>spawnSignal(src,t,col,d+j*28,0.82)));
    delay+=360;
  }
}

// ═══ PROXIMITY GLOW ════════════════════════════════
let mouseRX=CX,mouseRY=H/2;
svg.on('mousemove.prox',function(e){
  const tr=d3.zoomTransform(svg.node());
  mouseRX=(e.clientX-tr.x)/tr.k; mouseRY=(e.clientY-tr.y)/tr.k;
  aurora.attr('cx',mouseRX).attr('cy',mouseRY).attr('opacity',1);
});
svg.on('mouseleave.prox',()=>aurora.attr('opacity',0));

function proxLoop(){
  if(!activeNode){
    const tr=d3.zoomTransform(svg.node()),PROX=215/tr.k;
    nodeG.each(function(d){
      const dx=d.x-mouseRX,dy=d.y-mouseRY,dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<PROX){
        const t=Math.pow(1-dist/PROX,2.4);
        d3.select(this).select('.node-body')
          .attr('stroke-opacity',.52+t*.48).attr('r',NODE_R+t*2.8)
          .attr('filter',t>.42?`url(#gl-${d.layer})`:null);
        d3.select(this).select('.prox-ring').attr('stroke-opacity',t*.5).attr('r',NODE_R+10+t*5);
        d3.select(this).select('.nucleus').attr('r',4.5+t*1.8);
      }else{
        d3.select(this).select('.node-body').attr('stroke-opacity',.52).attr('r',NODE_R).attr('filter',null);
        d3.select(this).select('.prox-ring').attr('stroke-opacity',0);
        d3.select(this).select('.nucleus').attr('r',4.5);
      }
    });
  }
  requestAnimationFrame(proxLoop);
}

// ═══ 3-D PARALLAX TILT ═════════════════════════════
let tRx=0,tRy=0,cRx=0,cRy=0;
const graphInner=document.getElementById('graph-inner');
document.addEventListener('mousemove',e=>{
  tRx=(e.clientY/H-.5)*4.5; tRy=(e.clientX/W-.5)*-4.5;
});
document.addEventListener('mouseleave',()=>{tRx=0;tRy=0;});
function tiltLoop(){
  cRx+=(tRx-cRx)*.05; cRy+=(tRy-cRy)*.05;
  if(Math.abs(cRx)>.003||Math.abs(cRy)>.003)
    graphInner.style.transform=`rotateX(${cRx.toFixed(3)}deg) rotateY(${cRy.toFixed(3)}deg)`;
  requestAnimationFrame(tiltLoop);
}

// ═══ TOOLTIP ═══════════════════════════════════════
const tt=document.getElementById('tt');
function showTT(e,d){
  const col=LAYERS[d.layer].col;
  document.getElementById('tt-layer').style.color=col;
  document.getElementById('tt-layer').textContent=LAYERS[d.layer].label;
  document.getElementById('tt-name').textContent=d.label;
  document.getElementById('tt-eq').textContent=d.eq||'';
  document.getElementById('tt-eq').style.color=col;
  document.getElementById('tt-desc').textContent=d.desc||'';
  const lnk=document.getElementById('tt-link');lnk.href=d.url||'#';lnk.style.color=col;
  moveTT(e);tt.style.opacity='1';
}
function moveTT(e){
  let x=e.clientX+18,y=e.clientY-8;
  if(x+302>innerWidth)x=e.clientX-302-10;
  if(y+215>innerHeight)y=e.clientY-215;
  tt.style.left=x+'px';tt.style.top=y+'px';
}
function hideTT(){tt.style.opacity='0';}

// ═══ BOOT ══════════════════════════════════════════
setTimeout(()=>{
  proxLoop();tiltLoop();
  const intro=document.getElementById('intro');
  intro.style.opacity='0';
  setTimeout(()=>intro.remove(),950);
},750);
</script>
</body>
